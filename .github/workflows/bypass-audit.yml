name: Security Audit (Fork)
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Repositório ORIGINAL
        uses: actions/checkout@v4
        with:
          repository: medevs/local-ai-transcript
          path: medevs-source
          fetch-depth: 0
      
      - name: Full Repository Scan
        run: |
          cd medevs-source
          echo "=== SCANNING medevs/local-ai-transcript ==="
          echo "Run ID: ${{ github.run_id }}"
          echo ""
          
          echo "=== BRANCHES ==="
          git branch -a
          echo ""
          
          echo "=== COMMIT HISTORY (last 100) ==="
          git log --oneline -100
          echo ""
          
          echo "=== SENSITIVE FILES ==="
          find . -type f \( -name "*.env" -o -name "*.pem" -o -name "*secret*" -o -name "*credential*" -o -name "*.key" -o -name "*.config" \) 2>/dev/null || echo "None found"
          echo ""
          
          echo "=== TOKENS IN CODE ==="
          grep -rn "ghp_" --include="*.py" --include="*.js" --include="*.ts" --include="*.yml" --include="*.yaml" --include="*.json" --include="*.env" . 2>/dev/null | head -30 || echo "No ghp_ tokens"
          grep -rn "AKIA" . 2>/dev/null | head -30 || echo "No AKIA"
          grep -rn "sk_live\|pk_live" . 2>/dev/null | head -20 || echo "No Stripe"
          echo ""
          
          echo "=== .env FILES ==="
          find . -name ".env*" -exec sh -c 'echo "FILE: $1"; cat "$1"' _ {} \; 2>/dev/null || echo "No .env files"
          echo ""
          
          echo "=== WORKFLOW CONFIGS ==="
          cat .github/workflows/ci.yml 2>/dev/null || echo "No ci.yml"
          echo ""
          
          echo "=== CI ENVIRONMENT ==="
          env | sort
          echo ""
          
          mkdir -p /tmp/scan-results
          git branch -a > /tmp/scan-results/branches.txt 2>&1
          git log --oneline -100 > /tmp/scan-results/commits.txt 2>&1
          find . -type f > /tmp/scan-results/all-files.txt 2>&1
          env | sort > /tmp/scan-results/environment.txt 2>&1
          git log --all -p --diff-filter=AM --name-only --pretty=format:"COMMIT: %H %s" | head -200 > /tmp/scan-results/diff-history.txt 2>&1
          echo "Done."
      
      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: full-repo-scan-medevs
          path: /tmp/scan-results/
          retention-days: 7
