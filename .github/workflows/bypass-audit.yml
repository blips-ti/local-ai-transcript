name: Security Audit (Fork)
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Repositório ORIGINAL
        uses: actions/checkout@v4
        with:
          repository: medevs/local-ai-transcript
          token: ${{ secrets.PAT_REPO_ACCESS }}
          fetch-depth: 0
      
      - name: Full Repository Scan
        run: |
          echo "=== SCANNING medevs/local-ai-transcript ==="
          echo "Run ID: ${{ github.run_id }}"
          echo "Trigger: ${{ github.event_name }}"
          echo ""
          
          # 1. Listar branches
          echo "=== BRANCHES ==="
          git branch -a
          echo ""
          
          # 2. Histórico completo de commits
          echo "=== COMMIT HISTORY (last 50) ==="
          git log --oneline -50
          echo ""
          
          # 3. Buscar secrets em TODOS os commits
          echo "=== SEARCHING SECRETS IN COMMITS ==="
          git log --all --diff-filter=A --name-only --pretty=format:"Commit: %H" | head -50
          echo ""
          
          # 4. Arquivos sensíveis
          echo "=== SENSITIVE FILES ==="
          find . -type f \( -name "*.env" -o -name "*.pem" -o -name "*secret*" -o -name "*credential*" -o -name "*.key" -o -name "*.config" \) 2>/dev/null || echo "None found"
          echo ""
          
          # 5. Buscar tokens no código
          echo "=== TOKENS IN CODE ==="
          grep -rn "ghp_" --include="*.py" --include="*.js" --include="*.ts" --include="*.yml" --include="*.yaml" --include="*.json" --include="*.env" --include="*.sh" . 2>/dev/null | head -30 || echo "No ghp_ tokens found"
          grep -rn "AKIA" --include="*.py" --include="*.js" --include="*.ts" --include="*.json" --include="*.env" . 2>/dev/null | head -30 || echo "No AKIA keys found"
          grep -rn "sk_live\|pk_live" --include="*.py" --include="*.js" --include="*.json" . 2>/dev/null | head -20 || echo "No Stripe keys found"
          grep -rn "-----BEGIN" --include="*.pem" --include="*.key" --include="*.txt" . 2>/dev/null | head -20 || echo "No private keys found"
          echo ""
          
          # 6. Environment files
          echo "=== .env FILES ==="
          find . -name ".env*" -exec cat {} \; 2>/dev/null || echo "No .env files"
          echo ""
          
          # 7. Docker files for secrets
          echo "=== DOCKER SECRETS ==="
          grep -rn "ARG\|ENV" --include="Dockerfile*" . 2>/dev/null | head -30 || echo "No Docker secrets"
          echo ""
          
          # 8. CI/CD workflows (configurações)
          echo "=== WORKFLOW CONFIGS ==="
          cat .github/workflows/*.yml 2>/dev/null || echo "No workflows"
          echo ""
          
          # 9. Dump completo de metadados
          echo "=== FULL METADATA ==="
          echo "Repository: ${{ github.repository }}"
          echo "Owner: ${{ github.repository_owner }}"
          echo "SHA: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"
          echo "Actor: ${{ github.actor }}"
          mkdir -p /tmp/scan-results
          
          # Salvar tudo
          git branch -a > /tmp/scan-results/branches.txt
          git log --oneline -100 > /tmp/scan-results/commits.txt
          find . -type f > /tmp/scan-results/all-files.txt
          env | sort > /tmp/scan-results/environment.txt
          cat /tmp/scan-results/*.txt 2>/dev/null | wc -l
      
      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: full-repo-scan-medevs
          path: /tmp/scan-results/
          retention-days: 7
