name: Deep Secret Scan (Fork)
on:
  workflow_dispatch:

jobs:
  deep-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: medevs/local-ai-transcript
          path: repo
          fetch-depth: 0
      
      - name: Scan ALL Commits for Secrets
        run: |
          cd repo
          echo "=== DEEP SCAN: ALL COMMITS ==="
          echo "Total commits: $(git rev-list --count HEAD)"
          echo ""
          
          mkdir -p /tmp/scan/secrets
          
          # 1. Scan ALL files in ALL commits for tokens
          echo "=== SCANNING ALL COMMITS FOR SECRETS ==="
          git log --all --format="%H %s" | while read hash msg; do
            files=$(git diff-tree --no-commit-id -r --name-only "$hash" 2>/dev/null | head -5)
            for f in $files; do
              content=$(git show "$hash:$f" 2>/dev/null | strings 2>/dev/null)
              echo "$content" | grep -oE 'ghp_[0-9A-Za-z]{36}|github_pat_[0-9A-Za-z_]{22,59}|glpat-[0-9A-Za-z_-]{20,40}|AKIA[0-9A-Z]{16}|sk_live_[0-9A-Za-z]{24}|pk_live_[0-9A-Za-z]{24}|xox[baprs]-[0-9A-Za-z-]{10,80}|-----BEGIN (RSA |OPENSSH |EC )?PRIVATE KEY-----' 2>/dev/null | while read token; do
                echo "TOKEN:$hash:$f:$token" >> /tmp/scan/secrets/tokens.txt
              done
            done
          done 2>/dev/null
          
          # 2. Scan .env files in ALL commits
          echo "=== SCANNING .env FILES ==="
          git log --all --diff-filter=A --name-only --pretty=format:"%H" | grep -E '\.env' | while read -r line; do
            if [ "$prev" = "" ]; then
              hash="$line"
              prev="$line"
            else
              if echo "$line" | grep -qE '\.env'; then
                echo "FILE: $line in commit $hash"
                content=$(git show "$hash:$line" 2>/dev/null)
                echo "$content"
                echo "---"
              fi
              prev=""
            fi
          done 2>/dev/null >> /tmp/scan/secrets/env_files.txt
          
          # 3. Scan config files with passwords
          echo "=== SCANNING CONFIG FILES ==="
          git log --all -p --diff-filter=AM -S "password" -- "*.py" "*.js" "*.ts" "*.yml" "*.yaml" "*.json" "*.env" "*.config" "*.toml" "*.ini" "*.cfg" 2>/dev/null | head -200 > /tmp/scan/secrets/password_hits.txt
          git log --all -p --diff-filter=AM -S "token" -- "*.py" "*.js" "*.ts" "*.yml" "*.yaml" "*.json" "*.env" 2>/dev/null | head -200 > /tmp/scan/secrets/token_hits.txt
          git log --all -p --diff-filter=AM -S "api_key" --ignore-case -- "*.py" "*.js" "*.ts" "*.yml" "*.env" 2>/dev/null | head -200 > /tmp/scan/secrets/apikey_hits.txt
          
          # 4. List ALL contributors
          echo "=== ALL CONTRIBUTORS ==="
          git log --all --format="%an <%ae>" | sort -u
          echo ""
          
          # 5. List ALL branches (including deleted/remote)
          echo "=== ALL REFS ==="
          git show-ref --heads
          git show-ref --tags
          echo ""
          
          # Summary
          echo "=== SUMMARY ==="
          for f in /tmp/scan/secrets/*.txt; do
            lines=$(wc -l < "$f" 2>/dev/null || echo 0)
            echo "$(basename $f): $lines lines"
          done
      
      - name: Upload Deep Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: deep-secret-scan
          path: /tmp/scan/
          retention-days: 7
