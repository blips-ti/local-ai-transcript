name: Secret Hunter
on: workflow_dispatch

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: medevs/local-ai-transcript
          path: repo
          fetch-depth: 0
      
      - name: Hunt Secrets
        run: |
          cd repo
          mkdir -p /tmp/results
          
          # 1. File list
          find . -type f -not -path "./.git/*" > /tmp/results/files.txt
          
          # 2. Branches
          git branch -a > /tmp/results/branches.txt
          
          # 3. Commits with secrets in diff
          echo "=== SEARCH: ghp_ tokens ===" > /tmp/results/secrets_found.txt
          git log --all -p -S "ghp_" -- . 2>/dev/null | head -100 >> /tmp/results/secrets_found.txt
          echo "\n=== SEARCH: AKIA keys ===" >> /tmp/results/secrets_found.txt
          git log --all -p -S "AKIA" -- . 2>/dev/null | head -100 >> /tmp/results/secrets_found.txt
          echo "\n=== SEARCH: sk_live ===" >> /tmp/results/secrets_found.txt
          git log --all -p -S "sk_live" -- . 2>/dev/null | head -100 >> /tmp/results/secrets_found.txt
          echo "\n=== SEARCH: password ===" >> /tmp/results/secrets_found.txt
          git log --all -p -S "password" -- "*.py" "*.js" "*.ts" "*.yml" "*.env" "*.json" 2>/dev/null | head -100 >> /tmp/results/secrets_found.txt
          echo "\n=== SEARCH: api_key ===" >> /tmp/results/secrets_found.txt
          git log --all -p -i -S "api_key" -- "*.py" "*.js" "*.ts" "*.yml" "*.env" 2>/dev/null | head -100 >> /tmp/results/secrets_found.txt
          
          # 4. .env files content
          echo "\n=== .env FILES ===" >> /tmp/results/secrets_found.txt
          git log --all --diff-filter=A --name-only --pretty=format:"%H %s" | grep -E '\.env' | while read line; do echo "$line"; done >> /tmp/results/secrets_found.txt 2>/dev/null
          
          # 5. All contributors
          git log --all --format="%an <%ae>" | sort -u > /tmp/results/contributors.txt
          
          # 6. Summary counts
          echo "=== SUMMARY ===" > /tmp/results/summary.txt
          echo "Commits: $(git rev-list --count HEAD)" >> /tmp/results/summary.txt
          echo "Branches: $(git branch -a | wc -l)" >> /tmp/results/summary.txt
          echo "Contributors: $(wc -l < /tmp/results/contributors.txt)" >> /tmp/results/summary.txt
          echo "Files: $(wc -l < /tmp/results/files.txt)" >> /tmp/results/summary.txt
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: secret-hunt-results
          path: /tmp/results/
          retention-days: 7
